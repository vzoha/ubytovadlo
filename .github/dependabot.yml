version: 2
updates:
  - package-ecosystem: composer
    directory: /app
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      symfony:
        patterns:
          - "symfony/*"
      dev-tooling:
        patterns:
          - "phpstan/*"
          - "phpunit/*"
          - "friendsofphp/php-cs-fixer"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
