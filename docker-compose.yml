services:
  app:
    build: ./docker/php
    volumes:
      - ./app:/app
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mysql://ubytovadlo:ubytovadlo@db:3306/ubytovadlo?serverVersion=8.4&charset=utf8mb4"
      APP_ENV: dev
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "while [ ! -f /app/composer.json ]; do sleep 1; done; if [ ! -d /app/vendor ]; then composer install --no-interaction; fi; php -S 0.0.0.0:8000 -t public"]

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ubytovadlo
      MYSQL_USER: ubytovadlo
      MYSQL_PASSWORD: ubytovadlo
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db-data:
